# =============================================================================
# SPECTRABREAST — CONFIGURAZIONE PIPELINE
# =============================================================================
# Tutti i path sono assoluti o relativi alla root del progetto.
# Il sample_name viene definito UNA SOLA VOLTA e usato come prefisso file.

# -----------------------------------------------------------------------------
# MODALITA' DI ESECUZIONE
# -----------------------------------------------------------------------------
# "single" : pipeline normale su una singola coppia mesh + aruco
# "batch"  : scandisce input_dir e processa tutte le coppie sample trovate
# "sweep"  : esegue la pipeline su piu' coppie di risoluzioni (reg, pc)
mode: "single"

# -----------------------------------------------------------------------------
# CAMPIONE — prefisso per tutti i file di output (single + sweep)
# -----------------------------------------------------------------------------
sample_name: "SB019"

# -----------------------------------------------------------------------------
# PATHS — Input / Output
# -----------------------------------------------------------------------------
# In modalita' "batch" mesh e aruco_json vengono ignorati (scoperti automaticamente
# dal batch dentro input_dir). hsi_hdr resta valido solo se sample_hsi_map vuoto.
paths:
  hsi_hdr:    "/home/spectra/test/SpectraBreast-Registration/data/input/SB019/SB019_001/SB019_raw.hdr"
  mesh:       "/home/spectra/test/SpectraBreast-Registration/data/input/SAMPLE1/surface_mesh.ply"
  aruco_json: "/home/spectra/test/SpectraBreast-Registration/data/input/SAMPLE1/aruco_markers_3d.json"
  output_dir: "/home/spectra/test/SpectraBreast-Registration/data/output"

# -----------------------------------------------------------------------------
# REGISTRAZIONE
# -----------------------------------------------------------------------------
registration:
  hsi_extraction_method: "mean"   # "mean" | "visible_band" | "pca"
  aruco_dict:            "4X4_50" # dizionario ArUco
  marker_side_mm:        6.8      # lato fisico del marker in mm

  # SubPixel refinement post-detection
  use_subpix:     true
  subpix_winsize: 5

# -----------------------------------------------------------------------------
# RENDER — ray casting ortografico (PyTorch / CuPy)
# -----------------------------------------------------------------------------
render:
  resolution_mm_per_px:     2.0   # mm/px point cloud
  resolution_reg_mm_per_px: 0.5   # mm/px registrazione (piu' grossolano = piu' inlier)
  margin_mm:                10.0
  ray_chunk_size:           16384
  face_chunk_size:          2048
  sort_rays_for_culling:    true

# -----------------------------------------------------------------------------
# POINT CLOUD SPETTRALE
# -----------------------------------------------------------------------------
pointcloud:
  border_px:        2
  reflectance_norm: true
  pc_chunk_size:    100000

# -----------------------------------------------------------------------------
# EXPORT
# -----------------------------------------------------------------------------
export:
  save_pointcloud: false   # false = salta build/save point cloud
  ply:             true    # ignorato se save_pointcloud=false
  npy:             true    # ignorato se save_pointcloud=false
  csv:             false
  csv_max_points:  500000

  save_images:     false   # false = non salva nessuna immagine

# -----------------------------------------------------------------------------
# BATCH — usato solo quando mode == "batch"
# -----------------------------------------------------------------------------
# Scandisce input_dir e processa tutte le cartelle che matchano i pattern in
# sample_hsi_map. Per ogni cartella cerca mesh_filename + aruco_filename e
# usa l'HSI .hdr definito dal pattern.
# Output: <output_dir>/<nome_cartella_sample>/ + <output_dir>/batch_summary.xlsx
batch:
  input_dir:      "/data/input"
  mesh_filename:  "surface_mesh.ply"
  aruco_filename: "aruco_markers_3d.json"

  sample_hsi_map:
    "SAMPLE1*": "/data/input/SB019/SB019_001/SB019_raw.hdr"
    "SAMPLE2*": "/data/input/SB020/SB020_001/SB020_raw.hdr"

# -----------------------------------------------------------------------------
# SWEEP — usato solo quando mode == "sweep"
# -----------------------------------------------------------------------------
# Ignora i valori scalari di render.resolution_*_mm_per_px e cicla su tutte le
# coppie [res_reg, res_pc]. Durante lo sweep non vengono salvati ne' immagini
# ne' point cloud, tranne per la coppia migliore (se export.save_* = true).
sweep:
  resolution_pairs:
    - [5.0, 0.5]
    - [2.0, 0.5]
    - [1.5, 0.5]
    - [1.0, 0.5]
    - [0.5, 0.5]